# Netlify configuration for safesapcrtx.org

[build]
  publish = "."
  functions = "netlify/functions"
  command = "echo 'Static site - no build required'"

# Enable asset optimization
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[build.processing.images]
  compress = true

# ============================================
# FUNCTIONS CONFIGURATION
# ============================================

[functions]
  node_bundler = "esbuild"

  [functions."chat"]
    rate_limit = { window_size = 60, window_limit = 10 }

  [functions."newsletter-signup"]
    rate_limit = { window_size = 60, window_limit = 5 }

  [functions."contact-legislator"]
    rate_limit = { window_size = 60, window_limit = 5 }

  [functions."send-email"]
    rate_limit = { window_size = 60, window_limit = 3 }

  [functions."membership-notify"]
    rate_limit = { window_size = 60, window_limit = 3 }

  [functions."webhook-callback"]
    rate_limit = { window_size = 60, window_limit = 30 }

  [functions."petition-signatures"]
    rate_limit = { window_size = 60, window_limit = 5 }

  [functions."outreach-stats"]
    rate_limit = { window_size = 60, window_limit = 30 }

# ============================================
# EDGE FUNCTIONS
# ============================================

[[edge_functions]]
  function = "firewall"
  path = "/*"

[[edge_functions]]
  function = "rate-limit"
  path = "/case-study"

[[edge_functions]]
  path = "/*"
  function = "thank-you"
  excludedPath = ["/assets/*", "/images/*", "/css/*", "/js/*", "/.netlify/*", "/fonts/*", "/*.ico", "/*.png", "/*.jpg", "/*.svg", "/*.woff*"]

# ============================================
# REDIRECTS
# ============================================

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Security: block sensitive paths
[[redirects]]
  from = "/.env"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.env.*"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.well-known/traffic-advice"
  to = "/404.html"
  status = 410
  force = true

[[redirects]]
  from = "/backup.sql"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/sitemap_index.xml"
  to = "/sitemap.xml"
  status = 301
  force = true

[[redirects]]
  from = "/xmlrpc.php"
  to = "/404.html"
  status = 403
  force = true

[[redirects]]
  from = "/*wlwmanifest.xml"
  to = "/404.html"
  status = 410
  force = true

# Favicon fallback
[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.svg"
  status = 200

# ============================================
# SECURITY & SEO HEADERS
# ============================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Cross-Origin-Resource-Policy = "same-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.auth0.com https://www.googletagmanager.com https://www.google-analytics.com https://uynnupaoafbwouvgcedj.supabase.co; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://uynnupaoafbwouvgcedj.supabase.co https://*.auth0.com https://www.google-analytics.com https://analytics.google.com https://*.google-analytics.com https://*.netlify.app https://*.netlify.com https://ipapi.co https://ingesteer.services-prod.nsvcs.net https://cdn.jsdelivr.net; frame-ancestors 'none'; form-action 'self' https://*.auth0.com https://uynnupaoafbwouvgcedj.supabase.co; base-uri 'self'; object-src 'none'; upgrade-insecure-requests"
    X-Robots-Tag = "index, follow, max-image-preview:large"

[[headers]]
  for = "/case-study"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large, max-snippet:-1"
    Link = "<https://safesapcrtx.org/case-study>; rel=\"canonical\""
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    X-Robots-Tag = "index, follow, max-image-preview:large"
    Link = "<https://safesapcrtx.org/>; rel=\"canonical\""
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ============================================
# PLUGINS
# ============================================

[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    buildDir = "."
    exclude = [
      "./.netlify/**",
      "./netlify/**",
      "./node_modules/**",
      "./admin.html",
    ]
    changeFreq = "weekly"
    priority = 0.8

[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  [plugins.inputs]
    baseUrl = "https://safesapcrtx.org"
    sitemapPath = "/sitemap.xml"
    providers = ["google", "bing", "yandex"]

# Webhook callback API
[[redirects]]
  from = "/api/webhook-callback"
  to = "/.netlify/functions/webhook-callback"
  status = 200
  force = true

[[redirects]]
  from = "/api/webhook-callback/*"
  to = "/.netlify/functions/webhook-callback"
  status = 200
  force = true

# ActivityPub / Fediverse
[[redirects]]
  from = "/.well-known/nodeinfo"
  to = "/.well-known/nodeinfo"
  status = 200
  force = true
  headers = {Content-Type = "application/json"}

[[redirects]]
  from = "/nodeinfo/2.1"
  to = "/nodeinfo/2.1.json"
  status = 200
  force = true
  headers = {Content-Type = "application/json"}

[[redirects]]
  from = "/.well-known/webfinger"
  to = "/.well-known/webfinger"
  status = 200
  force = true
  headers = {Content-Type = "application/jrd+json"}

[[redirects]]
  from = "/actor"
  to = "/actor.json"
  status = 200
  force = true
  headers = {Content-Type = "application/activity+json"}

[[redirects]]
  from = "/.well-known/*"
  to = "/well.known/:splat"
  status = 200

# Discovery endpoint - Lambda proxy
[[redirects]]
  from = "/discovery"
  to = "https://qbbxof4ndhw2ok7b2yxzw6jw6m0ogsxw.lambda-url.us-east-2.on.aws"
  status = 200

# Security: block common probes
[[redirects]]
  from = "/?author=*"
  to = "/"
  status = 301
  force = true

[[redirects]]
  from = "/.vscode/sftp.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/sftp-config.json"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/?rest_route=/wp/v2/users*"
  to = "/404.html"
  status = 403
  force = true
