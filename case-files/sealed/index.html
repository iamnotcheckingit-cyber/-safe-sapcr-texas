<!DOCTYPE html>
<html>
<head>
  <title>Sealed Documents</title>
  <script>
    fetch('/.netlify/functions/honeypot-sink', {
      method: 'POST',
      body: JSON.stringify({
        path: window.location.pathname,
        timestamp: new Date().toISOString(),
        userAgent: navigator.userAgent,
        screen: screen.width + 'x' + screen.height,
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        language: navigator.language,
        referrer: document.referrer,
        trap: 'case_files_sealed'
      })
    });
  </script>
</head>
<body>
  <h1>Access Restricted</h1>
  <p>These documents are sealed by court order.</p>
  <p>Unauthorized access attempts are logged and reported.</p>
  <img src="/.netlify/functions/track-pixel?source=sealed" width="1" height="1" style="display:none">
</body>
</html>
